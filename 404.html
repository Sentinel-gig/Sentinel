<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sentinel</title>
    <script>
      // If /sentinel route → redirect to prototype
      if (window.location.pathname === '/sentinel') {
        window.location.replace('https://jazzy-crostata-b3b906.netlify.app/');
      } else {
        // All other routes → pass back to React SPA
        sessionStorage.redirect = window.location.href;
        window.location.replace('/');
      }
    </script>
  </head>
  <body></body>
</html>
